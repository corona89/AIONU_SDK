<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIONU SDK - 연결 디버깅 모드</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 20px; background: #fafafa; }
        .container { max-width: 800px; margin: 0 auto; }
        #chat-window { border: 1px solid #ddd; height: 450px; overflow-y: auto; padding: 15px; background: #fff; border-radius: 8px; margin-bottom: 10px; }
        .mesg { margin-bottom: 15px; }
        .user-tag { color: #007bff; font-weight: bold; }
        .ai-tag { color: #28a745; font-weight: bold; }
        .content { margin-top: 5px; line-height: 1.6; }
        .input-area { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        .suggestion-box { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
        .suggestion-item { background: #e7f3ff; color: #007bff; padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 0.9em; }
        .cors-warning { background: #fff3cd; color: #856404; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 0.9em; border: 1px solid #ffeeba; }
        .error-log { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 4px; margin-top: 10px; font-size: 0.85em; display: none; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div class="container">
        <h2>AIONU SDK 디버깅 예제</h2>

        <div id="protocol-warning" class="cors-warning" style="display:none;">
            ⚠️ <strong>경고:</strong> 현재 브라우저가 파일을 직접 열고 있습니다 (file://). <br>
            API 호출 시 CORS 오류가 발생할 수 있습니다. <code>python3 -m http.server</code> 등으로 실행하세요.
        </div>

        <div id="status-bar" style="font-size: 0.9em; margin-bottom: 10px; color: #666;">
            상태: <span id="status-text">대기 중...</span>
        </div>

        <div id="chat-window"></div>
        <div id="error-log" class="error-log"></div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="메시지를 입력하세요 (예: 보험 가입 절차)" onkeypress="if(event.keyCode==13) sendMessage()">
            <button id="sendBtn" onclick="sendMessage()">전송</button>
        </div>
    </div>

    <script src="marked.min.js"></script>
    <script src="jquery-3.7.1.min.js"></script>
    <script src="aionu-sdk.js"></script>

    <script>
        // Check protocol
        if (window.location.protocol === 'file:') {
            document.getElementById('protocol-warning').style.display = 'block';
        }

        var sdk = new AionUSDK({
            endpoint: 'https://api.abclab.ktds.com/v1',
            apiKey: 'app-lH1oxhFjNCSxMv9Dsgxdhygh'
        });

        $(document).ready(function() {
            sdk.getParameters(function(res) {
                $('#status-text').text('서버 연결 성공').css('color', 'green');
                if (res.opening_statement) appendMessage('AI', res.opening_statement, true);
                if (res.suggested_questions) showSuggestions(res.suggested_questions);
            }, function(xhr) {
                $('#status-text').text('연결 오류 (API Key 혹은 CORS 확인)').css('color', 'red');
            });
        });

        function appendMessage(sender, text, isAi) {
            var msgId = 'm-' + Math.random().toString(36).substr(2, 5);
            var html = '<div class="mesg"><span class="' + (isAi?'ai-tag':'user-tag') + '">' + sender + '</span>';
            html += '<div class="content" id="' + msgId + '">' + (isAi ? marked.parse(text) : text) + '</div></div>';
            $('#chat-window').append(html);
            $('#chat-window').scrollTop($('#chat-window')[0].scrollHeight);
            return msgId;
        }

        function showSuggestions(qs) {
            $('.suggestion-box').remove();
            var $box = $('<div class="suggestion-box"></div>');
            $.each(qs, function(i, q) {
                $('<div class="suggestion-item"></div>').text(q).on('click', function() {
                    $('#userInput').val(q); sendMessage();
                }).appendTo($box);
            });
            $('#chat-window').append($box);
        }

        function sendMessage() {
            var $input = $('#userInput');
            var query = $.trim($input.val());
            if (!query || $('#sendBtn').prop('disabled')) return;

            $('#error-log').hide();
            appendMessage('나', query, false);
            $input.val('');
            $('#sendBtn').prop('disabled', true);

            var aiMsgId = appendMessage('AI', '...', true);
            var $aiDiv = $('#' + aiMsgId);

            sdk.chatStream({
                query: query,
                onMessage: function(delta, full) {
                    $aiDiv.html(marked.parse(full));
                    $('#chat-window').scrollTop($('#chat-window')[0].scrollHeight);
                },
                onFinished: function(full, data) {
                    $('#sendBtn').prop('disabled', false);
                    if (data.message_id) {
                        sdk.getSuggested(data.message_id, function(s) { if(s.data) showSuggestions(s.data); });
                    }
                },
                onError: function(err) {
                    $('#sendBtn').prop('disabled', false);
                    var msg = err.message || JSON.stringify(err);
                    $('#error-log').text('에러 상세 정보:\n' + msg).show();
                    $aiDiv.html('<span style="color:red;">오류 발생 (상세 로그 참조)</span>');
                }
            });
        }
    </script>
</body>
</html>
