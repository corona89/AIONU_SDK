<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIONU SDK 고급 예제 (Parameters & Suggestions)</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f4f4f4; }
        #chat-window { border: 1px solid #ccc; height: 500px; overflow-y: scroll; padding: 10px; background: #fff; margin-bottom: 10px; }
        .mesg { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .user { color: blue; font-weight: bold; display: block; margin-bottom: 5px; }
        .ai { color: green; font-weight: bold; display: block; margin-bottom: 5px; }
        .content { line-height: 1.5; }
        .ref { font-size: 0.85em; color: #666; background: #f9f9f9; padding: 8px; margin-top: 10px; border-left: 3px solid #ccc; }
        .suggestion-box { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 5px; }
        .suggestion-item { background: #e1f5fe; border: 1px solid #03a9f4; color: #01579b; padding: 5px 10px; border-radius: 15px; cursor: pointer; font-size: 0.9em; }
        .suggestion-item:hover { background: #03a9f4; color: white; }
        .input-area { display: flex; gap: 5px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ddd; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 3px; }
        .config-area { margin-bottom: 20px; padding: 10px; border: 1px dashed #aaa; background: #fff; }
    </style>
</head>
<body>

    <h2>AIONU SDK 고급 예제</h2>

    <div class="config-area">
        <strong>앱 설정 (Parameters):</strong>
        <span id="opening-msg">연동 확인 중...</span>
        <button onclick="refreshChat()">채팅 초기화</button>
    </div>

    <div id="chat-window"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="질문을 입력하세요..." onkeypress="if(event.keyCode==13) sendMessage()">
        <button id="sendBtn" onclick="sendMessage()">전송</button>
    </div>

    <script src="marked.min.js"></script>
    <script src="jquery-3.7.1.min.js"></script>
    <script src="aionu-sdk.js"></script>

    <script>
        var sdk = new AionUSDK({
            endpoint: 'https://api.abclab.ktds.com/v1',
            apiKey: 'app-lH1oxhFjNCSxMv9Dsgxdhygh'
        });

        $(document).ready(function() {
            // 1. 초기 파라미터 가져오기
            try {
                sdk.getParameters(function(res) {
                    $('#opening-msg').text('연결됨');
                    if (res.opening_statement) {
                        appendMessage('AI', res.opening_statement, true);
                    }
                    if (res.suggested_questions) {
                        showSuggestions(res.suggested_questions);
                    }
                }, function(err) {
                    $('#opening-msg').text('설정 로드 실패 (API Key 확인 필요)');
                });
            } catch(e) { console.error(e); }
        });

        function renderMarkdown(text) { 
            try { return marked.parse(text); } catch(e) { return text; }
        }

        function appendMessage(sender, text, isAi) {
            var id = 'msg-' + new Date().getTime() + '-' + Math.floor(Math.random() * 1000);
            var $msg = $('<div class="mesg"></div>');
            $msg.append('<span class="' + (isAi ? 'ai' : 'user') + '">' + sender + '</span>');
            $msg.append('<div class="content" id="' + id + '">' + (isAi ? renderMarkdown(text) : text) + '</div>');
            $('#chat-window').append($msg);
            scrollBottom();
            return id;
        }

        function scrollBottom() {
            var cw = document.getElementById('chat-window');
            if (cw) cw.scrollTop = cw.scrollHeight;
        }

        function showSuggestions(questions) {
            $('.suggestion-box').remove();
            if (!questions || questions.length === 0) return;

            var $box = $('<div class="suggestion-box"></div>');
            $.each(questions, function(i, q) {
                var $item = $('<div class="suggestion-item"></div>').text(q);
                $item.on('click', function() {
                    $('#userInput').val(q);
                    sendMessage();
                });
                $box.append($item);
            });
            $('#chat-window').append($box);
            scrollBottom();
        }

        function sendMessage() {
            var $input = $('#userInput');
            var query = $input.val();
            if (!query || $('#sendBtn').prop('disabled')) return;

            $('.suggestion-box').remove(); 
            appendMessage('나', query, false);
            $input.val('');
            $('#sendBtn').prop('disabled', true);

            var aiMsgId = appendMessage('AI', '생각 중...', true);
            var $aiContent = $('#' + aiMsgId);
            
            sdk.chatStream({
                query: query,
                inputs: { "username": "주인님" },
                onMessage: function(delta, full) {
                    $aiContent.html(renderMarkdown(full));
                    scrollBottom();
                },
                onFinished: function(full, data) {
                    $('#sendBtn').prop('disabled', false);
                    
                    if (data && data.message_id) {
                        sdk.getSuggested(data.message_id, function(sugRes) {
                            if (sugRes && sugRes.data && sugRes.data.length > 0) {
                                showSuggestions(sugRes.data);
                            }
                        });
                    }

                    if (data && data.metadata && data.metadata.retriever_resources) {
                        var html = '<div class="ref"><strong>참조:</strong><ul>';
                        $.each(data.metadata.retriever_resources, function(i, r) {
                            html += '<li>' + (r.content || r.title || '출처').substring(0, 100) + '...</li>';
                        });
                        html += '</ul></div>';
                        $aiContent.closest('.mesg').append(html);
                    }
                    scrollBottom();
                },
                onError: function(err) {
                    $('#sendBtn').prop('disabled', false);
                    var errMsg = (err && err.message) ? err.message : '네트워크 오류가 발생했습니다.';
                    $aiContent.html('<span style="color:red;">오류: ' + errMsg + '</span>');
                    console.error('SDK Error:', err);
                }
            });
        }

        function refreshChat() {
            sdk.refresh();
            $('#chat-window').empty();
            appendMessage('시스템', '대화가 초기화되었습니다.', true);
            // 초기 설정 재로드 시도
            sdk.getParameters(function(res) {
                if (res.opening_statement) appendMessage('AI', res.opening_statement, true);
                if (res.suggested_questions) showSuggestions(res.suggested_questions);
            });
        }
    </script>
</body>
</html>
